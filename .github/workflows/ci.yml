name: CI

on:
  pull_request:
    branches:
      - 'main'
    paths-ignore:
      - LICENSE

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [ 20, 22, 24 ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          package-manager-cache: false
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
