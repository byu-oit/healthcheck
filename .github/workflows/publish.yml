name: Publish

on:
  push:
    branches: [main]

concurrency: publish-${{ github.ref }}

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - id: package
        run: |
          echo "name=$(npm pkg get name | tr -d '\"')" >> "$GITHUB_OUTPUT"
          echo "version=$(npm pkg get version | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - run: npm install

      - run: npm run build

      - run: npm run test:coverage

      - id: npmjs
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - id: npmjs-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          published_version="$(npm view "$PACKAGE_NAME" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
          if [ "$published_version" = "$PACKAGE_VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.npmjs-version.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - id: gpr
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com
          scope: '@byu-oit'
          package-manager-cache: false
      - id: gpr-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          published_version="$(npm view "$PACKAGE_NAME" version --registry=https://npm.pkg.github.com 2>/dev/null || true)"
          if [ "$published_version" = "$PACKAGE_VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gpr-version.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
